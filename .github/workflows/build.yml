name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Modern Kbuild u-boot: defconfig from configs/${soc}_defconfig,
        # `cp reg_info_${soc}.bin .reg`, then `make` — output is
        # u-boot.bin directly (no LZMA mini-boot wrapper).
        soc: [gk7202v300, gk7205v200, gk7205v300, gk7605v100]

    steps:
      - name: Install 32-bit libs
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq zlib1g:i386 libc6:i386 libstdc++6:i386

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache toolchain
        id: cache-tc
        uses: actions/cache@v4
        with:
          path: toolchain
          key: arm-hisiv300-linux-v1

      - name: Download toolchain
        if: steps.cache-tc.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v1 -R OpenIPC/toolchains \
            -p 'arm-hisiv300-linux.tar.bz2'
          mkdir -p toolchain
          tar xjf arm-hisiv300-linux.tar.bz2 -C toolchain
          rm arm-hisiv300-linux.tar.bz2
          ls toolchain/arm-hisiv300-linux/bin/arm-hisiv300-linux-uclibcgnueabi-gcc

      - name: Build
        run: |
          export PATH="$PWD/toolchain/arm-hisiv300-linux/bin:$PATH"
          export CROSS_COMPILE=arm-hisiv300-linux-uclibcgnueabi-
          which ${CROSS_COMPILE}gcc
          # The drivers/ddr/goke/default/cmd_bin/ Makefile lists COBJS
          # that include files from sibling directories without VPATH:
          #   ../ddr_training_{impl,ctl,console}.c
          #   ../../${SOC}/ddr_training_custom.c
          # The repo ships a prebuilt ddr_cmd.bin in cmd_bin/, but the
          # parent's `ddr_training_cmd_bin` target always re-invokes
          # the cmd_bin make, which then can't find those .c files.
          # Symlink them in so the rebuild succeeds.
          (
            cd drivers/ddr/goke/default/cmd_bin
            for f in ../ddr_training_impl.c ../ddr_training_ctl.c \
                     ../ddr_training_console.c \
                     ../../${{ matrix.soc }}/ddr_training_custom.c; do
              ln -sf "$f" "$(basename "$f")"
            done
          )
          # cmd_bin's CFLAGS reference a HiSi-internal path
          # `$(TOPDIR)/../../../source/bootloader/u-boot/include` that
          # doesn't exist in this fork — patch it to use $(TOPDIR)/include
          # instead so command.h and friends resolve.
          sed -i 's|/\.\./\.\./\.\./source/bootloader/u-boot/include|/include|' \
            drivers/ddr/goke/default/cmd_bin/Makefile
          make CROSS_COMPILE="$CROSS_COMPILE" ${{ matrix.soc }}_defconfig
          cp reg_info_${{ matrix.soc }}.bin .reg
          # The arm-hisiv300-linux toolchain defaults to gnu90; the
          # source uses C99 idioms (for-loop init declarations). Pass
          # -std=gnu99 through Kbuild's KCFLAGS hook.
          make CROSS_COMPILE="$CROSS_COMPILE" -j$(nproc) KCFLAGS=-std=gnu99
          # u-boot-z.bin wraps u-boot.bin in the gzip self-extractor
          # the bootrom expects (~250 KiB versus ~500 KiB raw). The
          # source-side recipe handles ddr_training source staging,
          # div0.c sourcing from arch/arm/lib/, and KBUILD_SRC fallback
          # internally.
          make CROSS_COMPILE="$CROSS_COMPILE" KCFLAGS=-std=gnu99 u-boot-z.bin
          cp u-boot-${{ matrix.soc }}.bin u-boot-${{ matrix.soc }}-universal.bin

      - name: Check partition fit
        run: |
          # The boot partition in mtdparts (gk-common.h) is 256 KiB
          # across every NOR/NAND/UBI variant. Anything past that
          # overflows into env at offset 0x40000 and bricks the device
          # on upgrade. Mirrors OpenIPC/firmware Makefile CHECK_SIZE.
          FILE=u-boot-${{ matrix.soc }}-universal.bin
          LIMIT_KB=256
          SIZE_KB=$(($(stat -c %s "$FILE") / 1024))
          echo "- $FILE: [${SIZE_KB}KB/${LIMIT_KB}KB]"
          if [ "$SIZE_KB" -gt "$LIMIT_KB" ]; then
            echo "-- size exceeded by: $((SIZE_KB - LIMIT_KB))KB"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: u-boot-${{ matrix.soc }}-universal
          path: u-boot-${{ matrix.soc }}-universal.bin

  qemu_smoke:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # All four Goke V4 SoCs in this repo are now testable. The
        # gk7205v300 / gk7605v100 silent-UART symptom was fixed by
        # qemu-hisilicon#79 — the boot-ROM stub's hardcoded 256 KiB
        # copy_sz wasn't large enough for the ~515 KiB Goke V4 u-boot
        # binaries, so execution jumped into a relocated section that
        # was never copied. Bumping copy_sz to 1 MiB closed the gap
        # for v300/v605 (and was a no-op net positive for v200/v202).
        include:
          - { soc: gk7205v200, machine: gk7205v200 }
          - { soc: gk7202v300, machine: gk7202v300 }
          - { soc: gk7205v300, machine: gk7205v300 }
          - { soc: gk7605v100, machine: gk7605v100 }
    steps:
      - name: Install QEMU build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential ninja-build meson pkg-config \
            libglib2.0-dev libpixman-1-dev libfdt-dev zlib1g-dev \
            libslirp-dev python3 python3-venv

      - name: Resolve qemu-hisilicon HEAD
        id: qemu-rev
        run: |
          sha=$(git ls-remote https://github.com/widgetii/qemu-hisilicon master | cut -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache qemu-system-arm
        id: cache-qemu
        uses: actions/cache@v4
        with:
          path: qemu-arm
          key: qemu-hisilicon-${{ steps.qemu-rev.outputs.sha }}

      - name: Build qemu-system-arm (cache miss)
        if: steps.cache-qemu.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch master \
            https://github.com/widgetii/qemu-hisilicon qemu-hisilicon
          cd qemu-hisilicon
          bash qemu/setup.sh
          cp qemu-src/build/qemu-system-arm "$GITHUB_WORKSPACE/qemu-arm"
          chmod +x "$GITHUB_WORKSPACE/qemu-arm"

      - name: Download u-boot artifact
        uses: actions/download-artifact@v4
        with:
          name: u-boot-${{ matrix.soc }}-universal

      - name: Smoke-test in QEMU
        timeout-minutes: 2
        run: |
          UBOOT="$PWD/u-boot-${{ matrix.soc }}-universal.bin"
          test -f "$UBOOT"
          dd if=/dev/zero of=/tmp/flash.bin bs=1M count=8 2>/dev/null
          dd if="$UBOOT" of=/tmp/flash.bin bs=1 conv=notrunc 2>/dev/null
          mkfifo /tmp/uart.in /tmp/uart.out
          chmod +x ./qemu-arm
          ./qemu-arm \
            -M ${{ matrix.machine }} \
            -global hisi-fmc.flash-file=/tmp/flash.bin \
            -nographic -serial pipe:/tmp/uart \
            -monitor none > /tmp/qemu.log 2>&1 &
          QEMU_PID=$!
          timeout 10 cat /tmp/uart.out > /tmp/uboot.txt || true
          kill "$QEMU_PID" 2>/dev/null || true
          wait 2>/dev/null || true
          echo "== captured u-boot output =="
          cat /tmp/uboot.txt
          echo
          if grep -qE 'U-Boot |Hit any key|CPU:|DRAM:|Board:' /tmp/uboot.txt; then
            echo "PASS: u-boot booted past System startup"
          else
            echo "FAIL: u-boot did not get past System startup"
            tail -40 /tmp/qemu.log || true
            exit 1
          fi

  publish:
    needs: [build, qemu_smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to OpenIPC/firmware latest release
        env:
          GH_TOKEN: ${{ secrets.FIRMWARE_RELEASE_TOKEN }}
        run: |
          set -eu
          upload() {
            local f="$1" i
            for i in 1 2 3 4 5; do
              if gh release upload latest "$f" --clobber -R OpenIPC/firmware; then
                return 0
              fi
              [ "$i" = "5" ] && return 1
              echo "upload attempt $i failed; sleeping $((i*10))s" >&2
              sleep $((i*10))
            done
          }
          for soc in gk7202v300 gk7205v200 gk7205v300 gk7605v100; do
            f="artifacts/u-boot-${soc}-universal/u-boot-${soc}-universal.bin"
            test -f "$f"
            upload "$f"
          done
